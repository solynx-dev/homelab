services:
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: umami
    ports:
      - "3200:3000"
    environment:
      DATABASE_URL: postgresql://umami:umami_atlas5@db:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: CHANGEME
      TRUST_PROXY: 1
    depends_on:
      db:
        condition: service_healthy
    restart: always

  db:
    image: postgres:16-alpine
    container_name: umami-db
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: umami_pw
    volumes:
      - umami-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  umami-db-data: 
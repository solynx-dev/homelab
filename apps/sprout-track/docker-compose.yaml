services:
  app:
    image: sprouttrack/sprout-track:latest
    container_name: sprout-track
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - db-data:/db
      - env-data:/app/env
    mem_limit: 1g
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://loc>
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  db-data:
    name: sprout-track-db
  env-data:
    name: sprout-track-env